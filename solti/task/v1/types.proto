syntax = "proto3";

package solti.task.v1;

// Shared value types for the task management API.
// Timestamps are Unix time in milliseconds unless stated otherwise.

// Phase of a task's current attempt.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING     = 1; // queued, not started yet
  TASK_STATUS_RUNNING     = 2; // currently executing
  TASK_STATUS_SUCCEEDED   = 3; // finished successfully
  TASK_STATUS_FAILED      = 4; // attempt failed; may restart per policy
  TASK_STATUS_TIMEOUT     = 5; // killed after exceeding timeout_ms
  TASK_STATUS_CANCELED    = 6; // stopped on request; not a failure
  TASK_STATUS_EXHAUSTED   = 7; // restart budget spent; no more retries
}

// When to restart a task after an attempt ends.
enum RestartStrategy {
  RESTART_STRATEGY_UNSPECIFIED = 0;
  RESTART_STRATEGY_NEVER       = 1; // never restart
  RESTART_STRATEGY_ON_FAILURE  = 2; // restart only on failure or non-zero exit
  RESTART_STRATEGY_ALWAYS      = 3; // always restart; waits restart_interval_ms
}

// Randomness added to each backoff delay to avoid retry storms.
// "base" is the delay computed by BackoffStrategy before jitter.
enum JitterStrategy {
  JITTER_STRATEGY_UNSPECIFIED  = 0;
  JITTER_STRATEGY_NONE         = 1; // exact base, no randomness
  JITTER_STRATEGY_FULL         = 2; // uniform in [0, base]
  JITTER_STRATEGY_EQUAL        = 3; // centered near base/2
  JITTER_STRATEGY_DECORRELATED = 4; // min(max, rand(base * 3))
}

// What to do when the target slot is already busy.
enum AdmissionStrategy {
  ADMISSION_STRATEGY_UNSPECIFIED     = 0;
  ADMISSION_STRATEGY_DROP_IF_RUNNING = 1; // ignore the new task, report success
  ADMISSION_STRATEGY_REPLACE         = 2; // cancel the running task, start the new one
  ADMISSION_STRATEGY_QUEUE           = 3; // wait, run when the slot frees up
}

// Built-in script interpreter. Use CustomRuntime for anything else.
enum ScriptRuntime {
  SCRIPT_RUNTIME_UNSPECIFIED = 0;
  SCRIPT_RUNTIME_BASH        = 1; // bash
  SCRIPT_RUNTIME_PYTHON      = 2; // python / python3
  SCRIPT_RUNTIME_NODE        = 3; // node
}

// One environment variable.
message KeyValue {
  string key   = 1;
  string value = 2;
}

// Run a command directly (resolved via PATH).
message CommandMode {
  string          command = 1; // executable name or path
  repeated string args    = 2;
}

// User-defined interpreter for a script.
message CustomRuntime {
  string command = 1; // interpreter path, e.g. "ruby"
  string flag    = 2; // inline-script flag, e.g. "-e"
}

// Run a script through a known or custom interpreter.
message ScriptMode {
  oneof runtime {
    ScriptRuntime well_known = 1; // built-in interpreter
    CustomRuntime custom     = 2; // user-defined interpreter
  }
  string          body = 3; // script content, base64-encoded
  repeated string args = 4;
}

// Run an external OS process.
message SubprocessTask {
  oneof mode {
    CommandMode command = 1; // direct command
    ScriptMode  script  = 2; // script via interpreter
  }
  repeated KeyValue env  = 3;
  optional string   cwd  = 4; // working directory; agent default if unset
  bool fail_on_non_zero  = 5; // treat non-zero exit as failure
}

// Run a WebAssembly module.
// (Reserved; agent support may be incomplete.)
message WasmTask {
  string            module = 1; // path to the .wasm file
  repeated string   args   = 2;
  repeated KeyValue env    = 3;
}

// Run an OCI container.
// (Reserved; agent support may be incomplete.)
message ContainerTask {
  string            image   = 1; // image reference
  repeated string   command = 2; // entrypoint override; image default if empty
  repeated string   args    = 3;
  repeated KeyValue env     = 4;
}

// Execution backend for a task.
message TaskKind {
  oneof kind {
    SubprocessTask subprocess = 1;
    WasmTask       wasm       = 2;
    ContainerTask  container  = 3;
  }
}

// Exponential backoff between restart attempts.
message BackoffStrategy {
  JitterStrategy jitter   = 1; // jitter applied to each delay
  uint64         first_ms = 2; // initial delay (ms); must be > 0
  uint64         max_ms   = 3; // delay cap (ms); must be >= first_ms
  double         factor   = 4; // growth multiplier; must be finite and > 0
}

// Immutable definition of a task, supplied at submission.
message CreateSpec {
  string              slot                = 1; // execution lane; non-empty, max 64 chars
  TaskKind            kind                = 2; // execution backend; required
  uint64              timeout_ms          = 3; // per-attempt timeout (ms); must be > 0
  RestartStrategy     restart             = 4; // restart policy
  optional uint64     restart_interval_ms = 5; // delay between runs; ALWAYS only
  BackoffStrategy     backoff             = 6; // retry backoff; required
  AdmissionStrategy   admission           = 7; // slot-conflict policy
  map<string, string> labels              = 8; // runner selector labels
}

// Identity, versioning and timestamps of a stored object.
message ObjectMeta {
  string id               = 1; // task id
  int64  created_at       = 2; // creation time (ms)
  int64  updated_at       = 3; // last-change time (ms)
  uint64 resource_version = 4; // optimistic-lock counter; starts at 1, bumps on change
}

// Observed status of a task's current attempt.
message TaskStatusInfo {
  TaskStatus      phase     = 1; // current phase
  uint32          attempt   = 2; // attempt number (1-based)
  optional string error     = 3; // last error message, if any
  optional int32  exit_code = 4; // process exit code, if the process exited
}

// Full task state: identity + definition + current status.
message TaskData {
  ObjectMeta     metadata = 1; // identity, version, timestamps
  CreateSpec     spec     = 2; // immutable definition
  TaskStatusInfo status   = 3; // current attempt status
}

// History record for one finished or running attempt.
message TaskRunInfo {
  uint32          attempt     = 1; // attempt number (1-based)
  TaskStatus      status      = 2; // phase of this attempt
  int64           started_at  = 3; // start time (ms)
  optional int64  finished_at = 4; // end time (ms); absent while running
  optional string error       = 5; // error message, if any
  optional int32  exit_code   = 6; // process exit code, if the process exited
}
